name: 🐛 Bug Report
description: Report a problem with @liqo/sdk
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! **Do not report security vulnerabilities here** — see [SECURITY.md](../SECURITY.md).
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code sample and steps. **Redact API keys and secrets.**
      render: ts
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs Actual
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: "@liqo/sdk version"
      placeholder: "2.0.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "sandbox | production; framework (Express/Next.js/…)"
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: My reproduction contains no secrets or API keys.
          required: true
        - label: This is not a security vulnerability.
          required: true
